<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cap-Palencia | Ofertas</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: #0e1020; color: #fff; }

        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.07);
            position: sticky; top: 0; background: #0e1020; z-index: 100;
        }
        .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; }
        .nav-logo span { color: #818cf8; }
        .nav-links { list-style: none; display: flex; gap: 32px; }
        .nav-links a {
            color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px;
            letter-spacing: 1px; transition: color 0.2s;
        }
        .nav-links a:hover { color: #fff; }

        .page-title {
            text-align: center; padding: 48px 32px 16px;
            font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 4px;
        }
        .page-sub {
            text-align: center; font-size: 13px; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 48px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px; padding: 0 32px 48px; max-width: 1100px; margin: 0 auto;
        }
        .card {
            background: #161929; border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px; overflow: hidden;
            transition: transform 0.25s ease, border-color 0.25s ease;
            position: relative;
        }
        .card:hover { transform: translateY(-6px); border-color: rgba(129,140,248,0.4); }
        .badge-oferta {
            position: absolute; top: 12px; left: 12px;
            background: #ef4444; color: #fff; font-size: 11px; font-weight: 500;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 4px 10px; border-radius: 6px; z-index: 1;
        }
        .img-wrap { background: #1e2235; aspect-ratio: 1/1; overflow: hidden; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-info { padding: 16px 18px 20px; }
        .marca { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #818cf8; font-weight: 500; margin-bottom: 6px; }
        .nombre { font-size: 16px; font-weight: 500; color: #f1f3ff; margin-bottom: 14px; }
        .card-footer { display: flex; align-items: center; justify-content: space-between; }
        .precios { display: flex; flex-direction: column; }
        .precio-antes { font-size: 13px; color: rgba(255,255,255,0.3); text-decoration: line-through; }
        .precio { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #ef4444; }
        .btn-agregar {
            background: rgba(129,140,248,0.15); border: 1px solid rgba(129,140,248,0.3);
            color: #818cf8; font-family: 'DM Sans', sans-serif; font-size: 12px;
            font-weight: 500; padding: 7px 14px; border-radius: 8px; cursor: pointer;
            transition: background 0.2s;
        }
        .btn-agregar:hover { background: rgba(129,140,248,0.28); }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">Cap<span>-</span>Palencia</div>
        <ul class="nav-links">
            <li><a href="/">Inicio</a></li>
            <li><a href="/categorias">Categorías</a></li>
            <li><a href="/ofertas">Ofertas</a></li>
            <li><a href="/contacto">Contacto</a></li>
        </ul>
    </nav>

    <h1 class="page-title">Ofertas</h1>
    <p class="page-sub">Precios especiales por tiempo limitado</p>

    <div class="container">
        <div class="card">
            <span class="badge-oferta">-20%</span>
            <div class="img-wrap">
                <img src="/images/Gorra1.jpg" alt="Gorra Blanca">
            </div>
            <div class="card-info">
                <p class="marca">New Era</p>
                <p class="nombre">Gorra Blanca Basica</p>
                <div class="card-footer">
                    <div class="precios">
                        <span class="precio-antes">$65.51</span>
                        <span class="precio">$52.40</span>
                    </div>
                    <button class="btn-agregar">Agregar</button>
                </div>
            </div>
        </div>

        <div class="card">
            <span class="badge-oferta">-15%</span>
            <div class="img-wrap">
                <img src="/images/Gorra2.jpg" alt="Gorra Azul">
            </div>
            <div class="card-info">
                <p class="marca">New Era</p>
                <p class="nombre">Gorra Azul Clasica</p>
                <div class="card-footer">
                    <div class="precios">
                        <span class="precio-antes">$65.51</span>
                        <span class="precio">$55.68</span>
                    </div>
                    <button class="btn-agregar">Agregar</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
