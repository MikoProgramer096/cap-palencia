<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cap-Palencia | Contacto</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: #0e1020; color: #fff; }

        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.07);
            position: sticky; top: 0; background: #0e1020; z-index: 100;
        }
        .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; }
        .nav-logo span { color: #818cf8; }
        .nav-links { list-style: none; display: flex; gap: 32px; }
        .nav-links a {
            color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px;
            letter-spacing: 1px; transition: color 0.2s;
        }
        .nav-links a:hover { color: #fff; }

        .page-title {
            text-align: center; padding: 48px 32px 40px;
            font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 4px;
        }

        .form-wrap {
            max-width: 560px; margin: 0 auto; padding: 0 32px 64px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block; font-size: 12px; letter-spacing: 1.5px;
            text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 8px;
        }
        input, textarea {
            width: 100%; background: #161929; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 14px 16px; color: #fff;
            font-family: 'DM Sans', sans-serif; font-size: 15px;
            transition: border-color 0.2s; outline: none;
        }
        input:focus, textarea:focus { border-color: rgba(129,140,248,0.5); }
        textarea { resize: vertical; min-height: 140px; }
        .btn-enviar {
            width: 100%; background: #818cf8; color: #fff; border: none;
            padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 14px;
            font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
            border-radius: 10px; cursor: pointer; transition: background 0.2s;
        }
        .btn-enviar:hover { background: #6366f1; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">Cap<span>-</span>Palencia</div>
        <ul class="nav-links">
            <li><a href="/">Inicio</a></li>
            <li><a href="/categorias">Categorías</a></li>
            <li><a href="/ofertas">Ofertas</a></li>
            <li><a href="/contacto">Contacto</a></li>
        </ul>
    </nav>

    <h1 class="page-title">Contacto</h1>

    <div class="form-wrap">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" placeholder="Tu nombre">
        </div>
        <div class="form-group">
            <label>Correo</label>
            <input type="email" placeholder="tu@correo.com">
        </div>
        <div class="form-group">
            <label>Mensaje</label>
            <textarea placeholder="¿En qué podemos ayudarte?"></textarea>
        </div>
        <button class="btn-enviar">Enviar Mensaje</button>
    </div>
</body>
</html>
